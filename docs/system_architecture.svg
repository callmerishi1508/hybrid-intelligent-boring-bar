<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style>
    .box { fill:#f3f4f6; stroke:#111827; stroke-width:1; rx:8; }
    .label { font-family:sans-serif; font-size:14px; fill:#111827; }
    .arrow { stroke:#0f172a; stroke-width:2; marker-end:url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0f172a" />
    </marker>
  </defs>

  <!-- Left column: Simulink -->
  <g transform="translate(40,40)">
    <rect class="box" width="200" height="60"/>
    <text class="label" x="100" y="36" text-anchor="middle">Simulink / Simscape</text>

    <g transform="translate(0,90)">
      <rect class="box" width="200" height="60"/>
      <text class="label" x="100" y="36" text-anchor="middle">H∞ Robust Controller</text>
    </g>

    <g transform="translate(0,180)">
      <rect class="box" width="200" height="60"/>
      <text class="label" x="100" y="36" text-anchor="middle">CNN Optimization</text>
    </g>

    <g transform="translate(0,270)">
      <rect class="box" width="200" height="60"/>
      <text class="label" x="100" y="36" text-anchor="middle">Hybrid Fused Controller</text>
    </g>
  </g>

  <!-- Middle: CSV export and Python pipeline -->
  <g transform="translate(300,180)">
    <rect class="box" width="220" height="60"/>
    <text class="label" x="110" y="36" text-anchor="middle">CSV Telemetry Export</text>

    <g transform="translate(0,120)">
      <rect class="box" width="220" height="60"/>
      <text class="label" x="110" y="36" text-anchor="middle">Python Telemetry Pipeline</text>
    </g>
  </g>

  <!-- Right: Azure -->
  <g transform="translate(680,100)">
    <rect class="box" width="220" height="60"/>
    <text class="label" x="110" y="36" text-anchor="middle">Azure IoT Hub</text>

    <g transform="translate(0,120)">
      <rect class="box" width="220" height="60"/>
      <text class="label" x="110" y="36" text-anchor="middle">Azure Digital Twin</text>
    </g>
  </g>

  <!-- arrows -->
  <path class="arrow" d="M240 70 L300 70" />
  <path class="arrow" d="M240 160 L300 160" />
  <path class="arrow" d="M240 250 L300 250" />
  <path class="arrow" d="M420 210 L520 210" />
  <path class="arrow" d="M520 240 L680 240" />
  <path class="arrow" d="M750 160 L750 190" />

  <!-- captions -->
  <text class="label" x="60" y="350">Flow: Simulation → Controller → CNN → Fusion → CSV → Pipeline → IoT → ADT</text>
</svg>